services:

  # ─────────────────────────────────────────
  # KAFKA (KRaft - không cần ZooKeeper)
  # ─────────────────────────────────────────
  broker:
    image: confluentinc/cp-kafka:7.4.0
    hostname: broker
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://broker:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://broker:29093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ['CMD-SHELL', 'nc -z localhost 9092']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - confluent

  # ─────────────────────────────────────────
  # POSTGRESQL - nguồn dữ liệu cho CDC
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5555:5432"
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # wal_level=logical bắt buộc để Debezium đọc được WAL
    command: postgres -c wal_level=logical
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - confluent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # DEBEZIUM - đọc CDC từ PostgreSQL → Kafka
  # ─────────────────────────────────────────
  kafka-connect:
    image: debezium/connect:2.4
    container_name: kafka-connect
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: broker:29092
      GROUP_ID: debezium-group
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
    networks:
      - confluent
    depends_on:
      broker:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/"]
      interval: 30s
      timeout: 10s
      retries: 10

  # Đăng ký Debezium connector tự động sau khi kafka-connect sẵn sàng
  connector-init:
    image: curlimages/curl:8.5.0
    container_name: connector-init
    volumes:
      - ./debezium:/connectors
    command: ["-X", "POST", "http://kafka-connect:8083/connectors",
              "-H", "Content-Type: application/json",
              "-d", "@/connectors/postgres-connector.json"]
    networks:
      - confluent
    depends_on:
      kafka-connect:
        condition: service_healthy
    restart: on-failure

  # ─────────────────────────────────────────
  # MINIO - lưu trữ output (S3-compatible)
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # API endpoint (Flink ghi vào đây)
      - "9001:9001"   # Web Console: http://localhost:9001
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - confluent
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Tạo bucket "warehouse" sau khi MinIO khởi động
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio123 &&
      mc mb --ignore-existing local/warehouse &&
      echo 'Bucket warehouse created.'
      "
    networks:
      - confluent
    depends_on:
      minio:
        condition: service_healthy

  # ─────────────────────────────────────────
  # FLINK CLUSTER
  # ─────────────────────────────────────────
  flink-jobmanager:
    build: ./flink_job
    container_name: flink-jobmanager
    hostname: flink-jobmanager
    command: jobmanager
    ports:
      - "18081:8081"   # Flink Web UI: http://localhost:18081
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.port: 8081
        s3.endpoint: http://minio:9000
        s3.access-key: minio
        s3.secret-key: minio123
        s3.path.style.access: true
    volumes:
      - ./flink_job:/opt/flink/jobs
    networks:
      - confluent
    depends_on:
      broker:
        condition: service_healthy
      minio:
        condition: service_healthy

  flink-taskmanager:
    build: ./flink_job
    container_name: flink-taskmanager
    hostname: flink-taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
        s3.endpoint: http://minio:9000
        s3.access-key: minio
        s3.secret-key: minio123
        s3.path.style.access: true
    networks:
      - confluent
    depends_on:
      - flink-jobmanager

networks:
  confluent:

volumes:
  minio_data:
